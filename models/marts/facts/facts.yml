version: 2

models:
  - name: fct_order_items
    description: Fact table at the grain of one row per order item.

    columns:
      - name: order_item_fact_key
        description: Surrogate key for the order item fact row.
        tests:
          - not_null
          - unique

      - name: order_id
        description: Order identifier.
        tests:
          - not_null

      - name: order_item_id
        description: Line item identifier within the order.

      - name: customer_key
        description: Foreign key to dim_customers.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key

      - name: product_key
        description: Foreign key to dim_products.

      - name: seller_key
        description: Foreign key to dim_sellers.

      - name: order_status_key
        description: Foreign key to dim_order_status.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_order_status')
                field: order_status_key

      - name: purchase_date_key
        description: Foreign key to dim_date for purchase date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: approved_date_key
        description: Foreign key to dim_date for approved date.
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: shipping_limit_date_key
        description: Foreign key to dim_date for shipping limit date.
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: delivered_carrier_date_key
        description: Foreign key to dim_date for carrier delivered date.
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: delivered_customer_date_key
        description: Foreign key to dim_date for customer delivered date.
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: estimated_delivery_date_key
        description: Foreign key to dim_date for estimated delivery date.
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: price
        description: Item price.

      - name: freight_value
        description: Freight charge.

      - name: total_item_value
        description: Total item value including freight.

      - name: item_count
        description: Number of item rows represented.
        tests:
          - not_null

  - name: fct_order_payments
    description: Fact table at the grain of one row per payment event within an order.

    columns:
      - name: order_payment_fact_key
        description: Surrogate key for the order payment fact row.
        tests:
          - not_null
          - unique

      - name: order_id
        description: Order identifier.
        tests:
          - not_null

      - name: payment_sequential
        description: Sequence number of the payment within the order.
        tests:
          - not_null

      - name: customer_key
        description: Foreign key to dim_customers.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key

      - name: order_status_key
        description: Foreign key to dim_order_status.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_order_status')
                field: order_status_key

      - name: payment_type_key
        description: Foreign key to dim_payment_type.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_payment_type')
                field: payment_type_key

      - name: purchase_date_key
        description: Foreign key to dim_date for purchase date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: approved_date_key
        description: Foreign key to dim_date for approved date.
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: payment_installments
        description: Number of installments used for the payment.
        tests:
          - not_null

      - name: payment_value
        description: Payment amount.
        tests:
          - not_null

      - name: payment_count
        description: Count of payments represented by the row.
        tests:
          - not_null

  - name: fct_order_reviews
    description: Fact table at the grain of one row per review.

    columns:
      - name: order_review_fact_key
        description: Surrogate key for the review fact row.
        tests:
          - not_null
          - unique

      - name: review_id
        description: Review identifier.
        tests:
          - not_null

      - name: order_id
        description: Order identifier.
        tests:
          - not_null

      - name: customer_key
        description: Foreign key to dim_customers.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key

      - name: order_status_key
        description: Foreign key to dim_order_status.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_order_status')
                field: order_status_key

      - name: purchase_date_key
        description: Foreign key to dim_date for purchase date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: delivered_customer_date_key
        description: Foreign key to dim_date for customer delivery date.
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: review_creation_date_key
        description: Foreign key to dim_date for review creation date.
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: review_answer_date_key
        description: Foreign key to dim_date for review answer date.
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: review_score
        description: Review score.
        tests:
          - not_null

      - name: has_review_comment
        description: Flag indicating whether the review has a comment.
        tests:
          - not_null