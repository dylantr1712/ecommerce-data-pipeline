version: 2

models:
  - name: dim_products
    description: Product dimension enriched with translated category names.
    columns:
      - name: product_key
        tests:
          - not_null
          - unique

      - name: product_id
        tests:
          - not_null
          - unique

  - name: dim_sellers
    description: Seller dimension.
    columns:
      - name: seller_key
        tests:
          - not_null
          - unique

      - name: seller_id
        tests:
          - not_null
          - unique

  - name: dim_order_status
    description: Lookup dimension for order lifecycle statuses.
    columns:
      - name: order_status_key
        tests:
          - not_null
          - unique

      - name: order_status
        tests:
          - not_null
          - unique

  - name: dim_payment_type
    description: Lookup dimension for payment types.
    columns:
      - name: payment_type_key
        tests:
          - not_null
          - unique

      - name: payment_type
        tests:
          - not_null
          - unique

  - name: dim_date
    description: Calendar date dimension used across fact tables.
    columns:
      - name: date_key
        tests:
          - not_null
          - unique

      - name: full_date
        tests:
          - not_null
          - unique

  - name: dim_customers
    description: Customer dimension with SCD Type 2 history tracking.
    columns:
      - name: customer_key
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: effective_date
        tests:
          - not_null

      - name: is_current
        tests:
          - not_null