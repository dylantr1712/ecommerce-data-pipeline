version: 2

models:
  - name: int_customers_deduped
    description: Cleaned customer records prepared for future SCD Type 2 processing.
    columns:
      - name: customer_id
        description: Business key for the customer.
        tests:
          - not_null

      - name: customer_attr_hash
        description: Hash of tracked customer attributes used for SCD2 change detection.
        tests:
          - not_null

      - name: ingestion_timestamp
        description: Timestamp representing when the record entered the pipeline.
        tests:
          - not_null

  - name: int_products_enriched
    description: Product records enriched with translated English category names.
    columns:
      - name: product_id
        description: Business key for the product.
        tests:
          - not_null
          - unique

  - name: int_orders_enriched
    description: Clean order-grain dataset used across downstream facts.
    columns:
      - name: order_id
        description: Business key for the order.
        tests:
          - not_null
          - unique

      - name: customer_id
        description: Customer associated with the order.
        tests:
          - not_null

      - name: order_status
        description: Lifecycle status of the order.
        tests:
          - not_null

  - name: int_order_items_enriched
    description: Order-item grain dataset enriched with order, product, and seller context.
    columns:
      - name: order_id
        description: Order business key.
        tests:
          - not_null

      - name: order_item_id
        description: Line-item identifier within the order.
        tests:
          - not_null

      - name: product_id
        description: Product business key.
        tests:
          - not_null

      - name: seller_id
        description: Seller business key.
        tests:
          - not_null

      - name: total_item_value
        description: Price plus freight value for the order item.
        tests:
          - not_null