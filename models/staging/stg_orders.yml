version: 2

models:
  - name: stg_orders
    description: Cleaned staging model for ecommerce orders.
    columns:
      - name: order_id
        description: Unique identifier for each order.
        tests:
          - not_null

      - name: customer_id
        description: Customer associated with the order.
        tests:
          - not_null

      - name: order_status
        description: Current status of the order.